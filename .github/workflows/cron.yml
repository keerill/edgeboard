name: cron (data ingestion)

# Replaces the Vercel Hobby crons (unavailable on the free plan) by hitting the
# protected /api/cron/* endpoints on a schedule.
#
# How it works: GitHub fires a SEPARATE run of this workflow for EACH `cron:`
# line that matches the current minute. Steps are gated on `github.event.schedule`
# so a given run only calls the endpoints for that cadence. `workflow_dispatch`
# runs every endpoint once, in dependency order — handy for seeding / verifying.
#
# Setup (one-time) — repo Settings → Secrets and variables → Actions → New secret:
#   CRON_BASE_URL   your prod URL, no trailing slash, e.g. https://edgeboard.vercel.app
#   CRON_SECRET     the same value as the CRON_SECRET env var on Vercel
#
# Notes:
#   • GitHub's minimum schedule interval is 5 min, and runs may be delayed
#     (sometimes by 10–30 min) or dropped under load — treat cadences as
#     "at least every N", not exact. Endpoints are written to be safe to re-run.
#   • Scheduled workflows only run from the DEFAULT branch and are auto-disabled
#     after 60 days of repo inactivity (a push or a manual run re-arms them).
#   • Public repo → Actions minutes are free and unlimited.

on:
  workflow_dispatch: # manual "run everything once" (seed / verify)
  schedule:
    - cron: "*/5 * * * *" # sync-trades + check-alerts
    - cron: "*/10 * * * *" # snapshot-prices
    - cron: "*/15 * * * *" # sync-markets
    - cron: "7 * * * *" # aggregate-whales (hourly, offset off the top of the hour)

permissions: {} # no repo access needed — we only make outbound HTTP calls

concurrency:
  # Serialize runs so overlapping schedules (e.g. minute 0 fires three crons)
  # don't double-write. Queue rather than cancel an in-flight ingestion.
  group: edgeboard-cron
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ secrets.CRON_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing repo secrets CRON_BASE_URL and/or CRON_SECRET. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi

      # Order below = dependency order, which is what `workflow_dispatch` follows.
      - name: sync-markets
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
        run: |
          curl --fail-with-body -sS --retry 2 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/sync-markets"

      - name: snapshot-prices
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
        run: |
          curl --fail-with-body -sS --retry 2 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/snapshot-prices"

      - name: sync-trades
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl --fail-with-body -sS --retry 2 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/sync-trades"

      - name: aggregate-whales
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7 * * * *'
        run: |
          curl --fail-with-body -sS --retry 2 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/aggregate-whales"

      - name: check-alerts
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl --fail-with-body -sS --retry 2 --retry-delay 10 --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/check-alerts"
